server {
    listen 80;
    server_name www.manus.llmops.org.cn manus.llmops.org.cn localhost 127.0.0.1 _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.manus.llmops.org.cn manus.llmops.org.cn localhost 127.0.0.1 _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/ssl/www.manus.llmops.org.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/www.manus.llmops.org.cn.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ----------------------------------------------------------
    # API 接口代理（含 WebSocket / SSE 支持）
    # ----------------------------------------------------------
    location /api/ {
        set $api_upstream http://multigen-api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;

        # WebSocket 支持（VNC 等）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 标准代理头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接支持
        proxy_buffering off;
        proxy_cache     off;

        # 超时设置（WebSocket 与 SSE 需要长超时）
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 60s;
    }

    location /storage/ {
        set $api_upstream http://multigen-api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 60s;
    }

    # ----------------------------------------------------------
    # 前端 UI 代理
    # ----------------------------------------------------------
    location / {
        set $ui_upstream http://multigen-ui:3000;
        proxy_pass $ui_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket（开发调试用）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
