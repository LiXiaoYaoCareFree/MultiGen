services:
  # ==================== 基础设施 ====================

  multigen-redis:
    image: redis:7-alpine
    container_name: multigen-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - multigen-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  multigen-postgres:
    image: postgres:16-alpine
    container_name: multigen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-multigen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multigen-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-multigen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务 ====================

  multigen-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: multigen-sandbox
    container_name: multigen-sandbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/supervisor/status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - multigen-network

  # ==================== 后端 API ====================

  multigen-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: multigen-api
    restart: unless-stopped
    env_file:
      - .env
    # 如需动态创建沙箱容器，取消以下注释以挂载 Docker Socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    depends_on:
      multigen-redis:
        condition: service_healthy
      multigen-postgres:
        condition: service_healthy
      multigen-sandbox:
        condition: service_healthy
    environment:
      REDIS_HOST: multigen-redis
      REDIS_PORT: 6379
      REDIS_ADDRESS: multigen-redis:6379
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@multigen-postgres:5432/${POSTGRES_DB:-multigen}
      SANDBOX_ADDRESS: multigen-sandbox:8080
      SANDBOX_NETWORK: multigen-network
    networks:
      multigen-network:
        aliases:
          - multigen-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== 前端 UI ====================

  multigen-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_ADMIN_LOGIN_REQUIRED: ${NEXT_PUBLIC_ADMIN_LOGIN_REQUIRED:-false}
        NEXT_PUBLIC_ADMIN_PASSWORD: ${NEXT_PUBLIC_ADMIN_PASSWORD:-}
    container_name: multigen-ui
    restart: unless-stopped
    depends_on:
      multigen-api:
        condition: service_healthy
    networks:
      multigen-network:
        aliases:
          - multigen-ui
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== Nginx 网关 ====================

  multigen-nginx:
    image: nginx:alpine
    container_name: multigen-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - multigen-ui
      - multigen-api
    networks:
      - multigen-network

# ==================== 数据卷 ====================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ==================== 网络 ====================
networks:
  multigen-network:
    name: multigen-network
    driver: bridge
